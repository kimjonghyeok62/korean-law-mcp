services:
  - type: web
    name: korean-law-mcp
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node build/index.js --mode http --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LAW_OC
        sync: false
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT_RPM
        value: "300"
